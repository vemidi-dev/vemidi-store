name: Production Data Audit

on:
  workflow_dispatch:

jobs:
  data-audit:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify required secrets
        run: |
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            echo "Missing repository secret: NEXT_PUBLIC_SUPABASE_URL"
            exit 1
          fi
          if [ -z "$SUPABASE_SECRET_KEY" ] && [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Missing repository secret: SUPABASE_SECRET_KEY or SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi

      - name: Run read-only data audit
        run: npm run test:release:data
