name: Preview Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Preview deployment base URL (e.g. https://vemidi-store-xxx.vercel.app)
        required: true
        type: string
      smoke_paths:
        description: Optional comma-separated extra paths (e.g. /categorii/foo,/produkti/bar)
        required: false
        type: string

jobs:
  preview-smoke:
    runs-on: ubuntu-latest
    env:
      SMOKE_PATHS: ${{ inputs.smoke_paths }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run preview HTTP smoke checks
        run: npm run smoke:preview -- --base-url=${{ inputs.base_url }}
